name: publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_ver=$(awk -F\" '/^version *=/ {print $2; exit}' Cargo.toml)
          if [ "$tag" != "$cargo_ver" ]; then
            echo "Tag $tag does not match Cargo.toml version $cargo_ver"
            exit 1
          fi

      - name: Test
        run: cargo test --all

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish 2>&1 | tee /tmp/cargo-publish.log; EXIT=${PIPESTATUS[0]}
          if [ $EXIT -eq 101 ] && grep -q "already exists" /tmp/cargo-publish.log; then
            echo "Version already published, continuing."
            exit 0
          fi
          exit $EXIT
