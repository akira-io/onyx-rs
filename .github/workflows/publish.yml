name: publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_ver=$(awk -F\" '/^version *=/ {print $2; exit}' Cargo.toml)
          if [ "$tag" != "$cargo_ver" ]; then
            echo "Tag $tag does not match Cargo.toml version $cargo_ver"
            exit 1
          fi

      - name: Test
        run: cargo test --all

      - name: Promote Unreleased to version
        run: |
          DATE=$(date -u +%Y-%m-%d)
          sed -i "s/^## \[Unreleased\]/## [${{ steps.version.outputs.version }}] - $DATE/" CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: release ${{ github.ref_name }}" || true

      - name: Push changelog
        run: git push origin HEAD:main || true

      - name: Check if version already published
        id: version_check
        run: |
          VER="${{ steps.version.outputs.version }}"
          if curl -fsSL "https://crates.io/api/v1/crates/onyx-rs/$VER" >/dev/null 2>&1; then
            echo "Already published: onyx-rs@$VER"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with crates.io
        if: steps.version_check.outputs.skip != 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        if: steps.version_check.outputs.skip != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish

      - name: Extract release notes
        id: notes
        run: |
          {
            echo 'body<<EOF'
            awk '/^## \[?v?${{ steps.version.outputs.version }}/,/^## \[?v?/' CHANGELOG.md | head -n -1
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          makeLatest: true
